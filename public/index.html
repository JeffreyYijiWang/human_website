<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volume Visualizer</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 1.5rem; }
      .row { margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
      canvas { max-width: 92vw; border: 1px solid #ccc; image-rendering: pixelated; }
      pre { background: #f6f6f6; padding: 0.75rem; border-radius: 6px; }
      button { padding: 0.35rem 0.7rem; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    </style>
  </head>
  <body>
    <h1>Volume Visualizer</h1>

    <div class="row">
      <label for="axis">Axis:</label>
      <select id="axis">
        <option value="z">z</option>
        <option value="y">y</option>
        <option value="x">x</option>
      </select>

      <label for="slice">Slice:</label>
      <input type="range" id="slice" min="0" max="0" value="0" />
      <span id="sliceValue">0</span>
    </div>

    <div class="row">
      <label for="yaw">Yaw</label>
      <input type="range" id="yaw" min="-180" max="180" value="0" step="0.5" />
      <span id="yawValue" class="mono">0.0</span>

      <label for="pitch">Pitch</label>
      <input type="range" id="pitch" min="-90" max="90" value="0" step="0.5" />
      <span id="pitchValue" class="mono">0.0</span>

      <label for="heapDepth">Heap depth</label>
      <input type="range" id="heapDepth" min="0" max="1" value="0.5" step="0.01" />
      <span id="heapDepthValue" class="mono">0.50</span>
    </div>

    <div class="row">
      <label><input type="checkbox" id="brownianEnabled" /> Brownian motion</label>
      <label for="brownianSpeed">Speed</label>
      <input type="range" id="brownianSpeed" min="0.1" max="4" step="0.1" value="1" />
      <span id="brownianSpeedValue" class="mono">1.0</span>
      <button id="recordBtn">Record 10 min video</button>
      <span id="recordStatus" class="mono">idle</span>
    </div>

    <div class="row">
      <canvas id="sliceCanvas" width="512" height="512"></canvas>
    </div>

    <h3>Metadata</h3>
    <pre id="meta">Loading...</pre>

    <script>
      const axisEl = document.getElementById('axis');
      const sliceEl = document.getElementById('slice');
      const sliceValueEl = document.getElementById('sliceValue');
      const yawEl = document.getElementById('yaw');
      const pitchEl = document.getElementById('pitch');
      const heapDepthEl = document.getElementById('heapDepth');
      const yawValueEl = document.getElementById('yawValue');
      const pitchValueEl = document.getElementById('pitchValue');
      const heapDepthValueEl = document.getElementById('heapDepthValue');
      const brownianEnabledEl = document.getElementById('brownianEnabled');
      const brownianSpeedEl = document.getElementById('brownianSpeed');
      const brownianSpeedValueEl = document.getElementById('brownianSpeedValue');
      const recordBtn = document.getElementById('recordBtn');
      const recordStatusEl = document.getElementById('recordStatus');
      const canvas = document.getElementById('sliceCanvas');
      const ctx = canvas.getContext('2d');
      const metaEl = document.getElementById('meta');

      let shape = [1, 1, 1];
      let lastFrameMs = performance.now();
      let noiseTime = 0;
      let velocity = { slice: 0, yaw: 0, pitch: 0, heap: 0 };

      function maxForAxis(axis) {
        const axisToIdx = { z: 0, y: 1, x: 2 };
        return Math.max(0, shape[axisToIdx[axis]] - 1);
      }

      function clamp(v, lo, hi) {
        return Math.min(hi, Math.max(lo, v));
      }

      function valueNum(el) {
        return Number(el.value);
      }

      function updateLabels() {
        sliceValueEl.textContent = sliceEl.value;
        yawValueEl.textContent = valueNum(yawEl).toFixed(1);
        pitchValueEl.textContent = valueNum(pitchEl).toFixed(1);
        heapDepthValueEl.textContent = valueNum(heapDepthEl).toFixed(2);
        brownianSpeedValueEl.textContent = valueNum(brownianSpeedEl).toFixed(1);
      }

      function setSliceBounds() {
        const max = maxForAxis(axisEl.value);
        sliceEl.max = String(max);
        sliceEl.value = String(clamp(valueNum(sliceEl), 0, max));
      }

      // Smooth-ish noise by layering sin waves + Brownian drift.
      function pseudoPerlin(t, f1, f2, f3, p1, p2, p3) {
        return (
          Math.sin(t * f1 + p1) * 0.55 +
          Math.sin(t * f2 + p2) * 0.30 +
          Math.sin(t * f3 + p3) * 0.15
        );
      }

      function applyBrownian(dt) {
        const speed = valueNum(brownianSpeedEl);
        noiseTime += dt * speed;

        velocity.slice += (Math.random() - 0.5) * dt * 25 * speed;
        velocity.yaw += (Math.random() - 0.5) * dt * 90 * speed;
        velocity.pitch += (Math.random() - 0.5) * dt * 70 * speed;
        velocity.heap += (Math.random() - 0.5) * dt * 0.55 * speed;

        velocity.slice *= 0.92;
        velocity.yaw *= 0.9;
        velocity.pitch *= 0.9;
        velocity.heap *= 0.88;

        const maxSlice = maxForAxis(axisEl.value);

        const sliceNoise = pseudoPerlin(noiseTime, 0.9, 1.5, 2.2, 0.2, 1.1, 2.0) * 3.0;
        const yawNoise = pseudoPerlin(noiseTime, 0.6, 1.1, 1.7, 0.9, 1.8, 3.2) * 4.2;
        const pitchNoise = pseudoPerlin(noiseTime, 0.7, 1.4, 2.4, 0.5, 2.5, 4.1) * 2.9;
        const heapNoise = pseudoPerlin(noiseTime, 0.5, 1.0, 2.1, 1.3, 0.7, 2.8) * 0.03;

        sliceEl.value = String(clamp(valueNum(sliceEl) + velocity.slice + sliceNoise, 0, maxSlice).toFixed(0));
        yawEl.value = String(clamp(valueNum(yawEl) + velocity.yaw + yawNoise, -180, 180));
        pitchEl.value = String(clamp(valueNum(pitchEl) + velocity.pitch + pitchNoise, -90, 90));
        heapDepthEl.value = String(clamp(valueNum(heapDepthEl) + velocity.heap + heapNoise, 0, 1));
      }

      async function updateImage() {
        updateLabels();

        const params = new URLSearchParams({
          axis: axisEl.value,
          index: String(Math.round(valueNum(sliceEl))),
          yaw: String(valueNum(yawEl).toFixed(3)),
          pitch: String(valueNum(pitchEl).toFixed(3)),
          heap_depth: String(valueNum(heapDepthEl).toFixed(4)),
          t: String(Date.now())
        });

        const res = await fetch(`/api/slice?${params.toString()}`);
        if (!res.ok) return;

        const blob = await res.blob();
        const bitmap = await createImageBitmap(blob);
        canvas.width = bitmap.width;
        canvas.height = bitmap.height;
        ctx.drawImage(bitmap, 0, 0);
        bitmap.close();
      }

      async function tick(now) {
        const dt = Math.min(0.2, (now - lastFrameMs) / 1000);
        lastFrameMs = now;

        if (brownianEnabledEl.checked) {
          applyBrownian(dt);
        }
        await updateImage();

        requestAnimationFrame(tick);
      }

      async function loadMeta() {
        const res = await fetch('/api/volume-meta');
        if (!res.ok) {
          metaEl.textContent = `Failed to load metadata: ${await res.text()}`;
          return;
        }

        const payload = await res.json();
        shape = payload.shape;
        metaEl.textContent = JSON.stringify(payload.meta, null, 2);
        setSliceBounds();
        updateLabels();
      }

      axisEl.addEventListener('change', () => { setSliceBounds(); updateLabels(); });
      [sliceEl, yawEl, pitchEl, heapDepthEl, brownianSpeedEl].forEach((el) => {
        el.addEventListener('input', updateLabels);
      });

      recordBtn.addEventListener('click', async () => {
        if (!window.MediaRecorder) {
          recordStatusEl.textContent = 'MediaRecorder unsupported';
          return;
        }

        recordBtn.disabled = true;
        recordStatusEl.textContent = 'recording...';

        const stream = canvas.captureStream(20);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
        const chunks = [];

        recorder.ondataavailable = (event) => {
          if (event.data && event.data.size > 0) chunks.push(event.data);
        };

        recorder.onstop = () => {
          const blob = new Blob(chunks, { type: 'video/webm' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `volume-brownian-${Date.now()}.webm`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
          recordStatusEl.textContent = 'saved';
          recordBtn.disabled = false;
        };

        recorder.start(1000);
        setTimeout(() => {
          if (recorder.state !== 'inactive') recorder.stop();
        }, 10 * 60 * 1000); // 10 minutes
      });

      (async function init() {
        await loadMeta();
        requestAnimationFrame(tick);
      })();
    </script>
  </body>
</html>
