<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volume Visualizer</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 1.5rem; }
      .row { margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
      canvas { max-width: 92vw; border: 1px solid #ccc; image-rendering: pixelated; }
      pre { background: #f6f6f6; padding: 0.75rem; border-radius: 6px; }
      button { padding: 0.35rem 0.7rem; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      #curveEditorPanel { border: 1px solid #ccc; border-radius: 8px; padding: 0.75rem; background: #fafafa; }
      #curveEditorPanel.hidden { display: none; }
      #curveCanvas { width: min(95vw, 900px); height: 440px; border: 1px solid #aaa; background: #0f172a; touch-action: none; }
      .muted { color: #555; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <h1>Volume Visualizer</h1>

    <div class="row">
      <label for="axis">Axis:</label>
      <select id="axis">
        <option value="z">z</option>
        <option value="y">y</option>
        <option value="x">x</option>
      </select>

      <label for="slice">Slice:</label>
      <input type="range" id="slice" min="0" max="0" value="0" />
      <span id="sliceValue">0</span>
    </div>

    <div class="row">
      <label for="yaw">Yaw</label>
      <input type="range" id="yaw" min="-180" max="180" value="0" step="0.5" />
      <span id="yawValue" class="mono">0.0</span>

      <label for="pitch">Pitch</label>
      <input type="range" id="pitch" min="-90" max="90" value="0" step="0.5" />
      <span id="pitchValue" class="mono">0.0</span>

      <label for="heapDepth">Heap depth</label>
      <input type="range" id="heapDepth" min="0" max="1" value="0.5" step="0.01" />
      <span id="heapDepthValue" class="mono">0.50</span>
    </div>

    <div class="row">
      <label><input type="checkbox" id="brownianEnabled" /> Brownian motion</label>
      <label for="brownianSpeed">Speed</label>
      <input type="range" id="brownianSpeed" min="0.1" max="4" step="0.1" value="1" />
      <span id="brownianSpeedValue" class="mono">1.0</span>
      <button id="recordBtn">Record 10 min video</button>
      <span id="recordStatus" class="mono">idle</span>
    </div>

    <div class="row">
      <canvas id="sliceCanvas" width="512" height="512"></canvas>
    </div>



    <div class="row">
      <label><input type="checkbox" id="curveModeEnabled" /> Curve mode</label>
      <span class="muted">Enable interactive 3D curve editing with gizmos.</span>
    </div>

    <div id="curveEditorPanel" class="hidden">
      <div class="row">
        <label for="curveType">Bezier type</label>
        <select id="curveType">
          <option value="cubic">Cubic Bezier (4-point spans)</option>
          <option value="quadratic">Quadratic Bezier (3-point spans)</option>
          <option value="poly">Polyline preview</option>
        </select>
        <label for="curveView">View</label>
        <select id="curveView">
          <option value="perspective">Perspective</option>
          <option value="front">Front</option>
          <option value="side">Side</option>
          <option value="top">Top</option>
        </select>
        <button id="addCurvePointBtn">Add point</button>
        <button id="removeCurvePointBtn">Remove selected</button>
        <label><input type="checkbox" id="curveAffectsDisplay" checked /> Affect display in Curve mode</label>
        <label><input type="checkbox" id="curveFrameBlend" checked /> Frame blend</label>
        <button id="openCurveWindowBtn">Open Curve Window</button>
      </div>
      <div class="row">
        <canvas id="curveCanvas" width="900" height="440"></canvas>
      </div>
      <div class="row muted">
        Click a point to select. Drag colored gizmo axis handles (X red, Y green, Z blue) to move per-axis.
        Press Tab inside curve canvas to cycle selected point.
      </div>
    </div>

    <h3>Metadata</h3>
    <pre id="meta">Loading...</pre>

    <script>
      const axisEl = document.getElementById('axis');
      const sliceEl = document.getElementById('slice');
      const sliceValueEl = document.getElementById('sliceValue');
      const yawEl = document.getElementById('yaw');
      const pitchEl = document.getElementById('pitch');
      const heapDepthEl = document.getElementById('heapDepth');
      const yawValueEl = document.getElementById('yawValue');
      const pitchValueEl = document.getElementById('pitchValue');
      const heapDepthValueEl = document.getElementById('heapDepthValue');
      const brownianEnabledEl = document.getElementById('brownianEnabled');
      const brownianSpeedEl = document.getElementById('brownianSpeed');
      const brownianSpeedValueEl = document.getElementById('brownianSpeedValue');
      const recordBtn = document.getElementById('recordBtn');
      const recordStatusEl = document.getElementById('recordStatus');
      const canvas = document.getElementById('sliceCanvas');
      const ctx = canvas.getContext('2d');
      const metaEl = document.getElementById('meta');

      let shape = [1, 1, 1];
      let lastFrameMs = performance.now();
      let noiseTime = 0;
      let velocity = { slice: 0, yaw: 0, pitch: 0, heap: 0 };
      let prevFrameCanvas = null;

      function maxForAxis(axis) {
        const axisToIdx = { z: 0, y: 1, x: 2 };
        return Math.max(0, shape[axisToIdx[axis]] - 1);
      }

      function clamp(v, lo, hi) {
        return Math.min(hi, Math.max(lo, v));
      }

      function valueNum(el) {
        return Number(el.value);
      }

      function updateLabels() {
        sliceValueEl.textContent = sliceEl.value;
        yawValueEl.textContent = valueNum(yawEl).toFixed(1);
        pitchValueEl.textContent = valueNum(pitchEl).toFixed(1);
        heapDepthValueEl.textContent = valueNum(heapDepthEl).toFixed(2);
        brownianSpeedValueEl.textContent = valueNum(brownianSpeedEl).toFixed(1);
      }

      function setSliceBounds() {
        const max = maxForAxis(axisEl.value);
        sliceEl.max = String(max);
        sliceEl.value = String(clamp(valueNum(sliceEl), 0, max));
      }

      // Smooth-ish noise by layering sin waves + Brownian drift.
      function pseudoPerlin(t, f1, f2, f3, p1, p2, p3) {
        return (
          Math.sin(t * f1 + p1) * 0.55 +
          Math.sin(t * f2 + p2) * 0.30 +
          Math.sin(t * f3 + p3) * 0.15
        );
      }

      function applyBrownian(dt) {
        const speed = valueNum(brownianSpeedEl);
        noiseTime += dt * speed;

        velocity.slice += (Math.random() - 0.5) * dt * 25 * speed;
        velocity.yaw += (Math.random() - 0.5) * dt * 90 * speed;
        velocity.pitch += (Math.random() - 0.5) * dt * 70 * speed;
        velocity.heap += (Math.random() - 0.5) * dt * 0.55 * speed;

        velocity.slice *= 0.92;
        velocity.yaw *= 0.9;
        velocity.pitch *= 0.9;
        velocity.heap *= 0.88;

        const maxSlice = maxForAxis(axisEl.value);

        const sliceNoise = pseudoPerlin(noiseTime, 0.9, 1.5, 2.2, 0.2, 1.1, 2.0) * 3.0;
        const yawNoise = pseudoPerlin(noiseTime, 0.6, 1.1, 1.7, 0.9, 1.8, 3.2) * 4.2;
        const pitchNoise = pseudoPerlin(noiseTime, 0.7, 1.4, 2.4, 0.5, 2.5, 4.1) * 2.9;
        const heapNoise = pseudoPerlin(noiseTime, 0.5, 1.0, 2.1, 1.3, 0.7, 2.8) * 0.03;

        sliceEl.value = String(clamp(valueNum(sliceEl) + velocity.slice + sliceNoise, 0, maxSlice).toFixed(0));
        yawEl.value = String(clamp(valueNum(yawEl) + velocity.yaw + yawNoise, -180, 180));
        pitchEl.value = String(clamp(valueNum(pitchEl) + velocity.pitch + pitchNoise, -90, 90));
        heapDepthEl.value = String(clamp(valueNum(heapDepthEl) + velocity.heap + heapNoise, 0, 1));
      }

      async function updateImage() {
        updateLabels();

        const params = new URLSearchParams({
          axis: axisEl.value,
          index: String(Math.round(valueNum(sliceEl))),
          yaw: String(valueNum(yawEl).toFixed(3)),
          pitch: String(valueNum(pitchEl).toFixed(3)),
          heap_depth: String(valueNum(heapDepthEl).toFixed(4)),
          t: String(Date.now())
        });

        const res = await fetch(`/api/slice?${params.toString()}`);
        if (!res.ok) {
          if (prevFrameCanvas) ctx.drawImage(prevFrameCanvas, 0, 0, canvas.width, canvas.height);
          return;
        }

        const blob = await res.blob();
        const bitmap = await createImageBitmap(blob);
        canvas.width = bitmap.width;
        canvas.height = bitmap.height;

        if (curveModeEnabledEl.checked && curveFrameBlendEl.checked && prevFrameCanvas) {
          ctx.globalAlpha = 0.35;
          ctx.drawImage(prevFrameCanvas, 0, 0, canvas.width, canvas.height);
          ctx.globalAlpha = 1;
        }

        ctx.drawImage(bitmap, 0, 0);
        if (curveModeEnabledEl.checked && curveAffectsDisplayEl.checked) {
          drawCurveOverlayOnSlice();
        }

        prevFrameCanvas = document.createElement('canvas');
        prevFrameCanvas.width = canvas.width;
        prevFrameCanvas.height = canvas.height;
        prevFrameCanvas.getContext('2d').drawImage(canvas, 0, 0);
        bitmap.close();
      }


      function drawCurveOverlayOnSlice() {
        const samples = sampleCurve();
        if (!samples.length) return;
        const sx = canvas.width / 400;
        const sy = canvas.height / 400;
        ctx.save();
        ctx.strokeStyle = 'rgba(255,180,0,0.95)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        samples.forEach((p, i) => {
          const x = canvas.width / 2 + p.x * sx;
          const y = canvas.height / 2 - p.y * sy;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
        ctx.restore();
      }

      async function tick(now) {
        const dt = Math.min(0.2, (now - lastFrameMs) / 1000);
        lastFrameMs = now;

        if (brownianEnabledEl.checked) {
          applyBrownian(dt);
        }
        await updateImage();
        drawCurveEditor();

        requestAnimationFrame(tick);
      }

      async function loadMeta() {
        const res = await fetch('/api/volume-meta');
        if (!res.ok) {
          metaEl.textContent = `Failed to load metadata: ${await res.text()}`;
          return;
        }

        const payload = await res.json();
        shape = payload.shape;
        metaEl.textContent = JSON.stringify(payload.meta, null, 2);
        setSliceBounds();
        updateLabels();
      }

      axisEl.addEventListener('change', () => { setSliceBounds(); updateLabels(); });
      [sliceEl, yawEl, pitchEl, heapDepthEl, brownianSpeedEl].forEach((el) => {
        el.addEventListener('input', updateLabels);
      });

      recordBtn.addEventListener('click', async () => {
        if (!window.MediaRecorder) {
          recordStatusEl.textContent = 'MediaRecorder unsupported';
          return;
        }

        recordBtn.disabled = true;
        recordStatusEl.textContent = 'recording...';

        const stream = canvas.captureStream(20);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
        const chunks = [];

        recorder.ondataavailable = (event) => {
          if (event.data && event.data.size > 0) chunks.push(event.data);
        };

        recorder.onstop = () => {
          const blob = new Blob(chunks, { type: 'video/webm' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `volume-brownian-${Date.now()}.webm`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
          recordStatusEl.textContent = 'saved';
          recordBtn.disabled = false;
        };

        recorder.start(1000);
        setTimeout(() => {
          if (recorder.state !== 'inactive') recorder.stop();
        }, 10 * 60 * 1000); // 10 minutes
      });


      const curveModeEnabledEl = document.getElementById('curveModeEnabled');
      const curveEditorPanelEl = document.getElementById('curveEditorPanel');
      const curveTypeEl = document.getElementById('curveType');
      const curveViewEl = document.getElementById('curveView');
      const addCurvePointBtn = document.getElementById('addCurvePointBtn');
      const removeCurvePointBtn = document.getElementById('removeCurvePointBtn');
      const curveCanvas = document.getElementById('curveCanvas');
      const curveCtx = curveCanvas.getContext('2d');
      const curveAffectsDisplayEl = document.getElementById('curveAffectsDisplay');
      const curveFrameBlendEl = document.getElementById('curveFrameBlend');
      const openCurveWindowBtn = document.getElementById('openCurveWindowBtn');

      let curvePoints = [
        { x: -120, y: -50, z: -80 },
        { x: -40, y: 100, z: -20 },
        { x: 80, y: -90, z: 40 },
        { x: 150, y: 40, z: 100 }
      ];
      let selectedPoint = 0;
      let drag = null;

      function projectPoint3D(p) {
        const v = curveViewEl.value;
        const w = curveCanvas.width, h = curveCanvas.height;
        const c = { x: w / 2, y: h / 2 };
        const scale = 1.2;
        if (v === 'front') return { x: c.x + p.x * scale, y: c.y - p.y * scale, depth: p.z };
        if (v === 'side') return { x: c.x + p.z * scale, y: c.y - p.y * scale, depth: p.x };
        if (v === 'top') return { x: c.x + p.x * scale, y: c.y - p.z * scale, depth: p.y };
        const z = p.z + 320;
        const persp = 320 / Math.max(40, z);
        return { x: c.x + p.x * persp * 1.4, y: c.y - p.y * persp * 1.4, depth: z };
      }

      function bezierPoint(points, t) {
        let work = points.map((p) => ({ ...p }));
        while (work.length > 1) {
          const next = [];
          for (let i = 0; i < work.length - 1; i++) {
            next.push({
              x: work[i].x * (1 - t) + work[i + 1].x * t,
              y: work[i].y * (1 - t) + work[i + 1].y * t,
              z: work[i].z * (1 - t) + work[i + 1].z * t
            });
          }
          work = next;
        }
        return work[0];
      }

      function sampleCurve() {
        if (curvePoints.length < 2) return [];
        const t = curveTypeEl.value;
        if (t === 'poly') return curvePoints;
        const segSize = t === 'quadratic' ? 3 : 4;
        const step = t === 'quadratic' ? 2 : 3;
        const samples = [];
        for (let i = 0; i + segSize - 1 < curvePoints.length; i += step) {
          const seg = curvePoints.slice(i, i + segSize);
          for (let s = 0; s <= 32; s++) samples.push(bezierPoint(seg, s / 32));
        }
        return samples.length ? samples : curvePoints;
      }

      function drawCurveEditor() {
        if (!curveModeEnabledEl.checked) return;
        curveCtx.clearRect(0, 0, curveCanvas.width, curveCanvas.height);
        curveCtx.fillStyle = '#0f172a';
        curveCtx.fillRect(0, 0, curveCanvas.width, curveCanvas.height);

        const samples = sampleCurve();
        curveCtx.strokeStyle = '#22d3ee';
        curveCtx.lineWidth = 2;
        curveCtx.beginPath();
        samples.forEach((p, i) => {
          const q = projectPoint3D(p);
          if (i === 0) curveCtx.moveTo(q.x, q.y);
          else curveCtx.lineTo(q.x, q.y);
        });
        curveCtx.stroke();

        curveCtx.strokeStyle = '#64748b';
        curveCtx.beginPath();
        curvePoints.forEach((p, i) => {
          const q = projectPoint3D(p);
          if (i === 0) curveCtx.moveTo(q.x, q.y);
          else curveCtx.lineTo(q.x, q.y);
        });
        curveCtx.stroke();

        curvePoints.forEach((p, idx) => {
          const q = projectPoint3D(p);
          curveCtx.fillStyle = idx === selectedPoint ? '#fbbf24' : '#e2e8f0';
          curveCtx.beginPath(); curveCtx.arc(q.x, q.y, idx === selectedPoint ? 7 : 5, 0, Math.PI * 2); curveCtx.fill();
        });

        if (curvePoints[selectedPoint]) drawGizmo(curvePoints[selectedPoint]);
      }

      function drawGizmo(p) {
        const o = projectPoint3D(p);
        const axes = [
          { key: 'x', color: '#ef4444', d: { x: 45, y: 0, z: 0 } },
          { key: 'y', color: '#22c55e', d: { x: 0, y: 45, z: 0 } },
          { key: 'z', color: '#3b82f6', d: { x: 0, y: 0, z: 45 } }
        ];
        axes.forEach((a) => {
          const tip = projectPoint3D({ x: p.x + a.d.x, y: p.y + a.d.y, z: p.z + a.d.z });
          curveCtx.strokeStyle = a.color; curveCtx.lineWidth = 3;
          curveCtx.beginPath(); curveCtx.moveTo(o.x, o.y); curveCtx.lineTo(tip.x, tip.y); curveCtx.stroke();
          curveCtx.fillStyle = a.color; curveCtx.beginPath(); curveCtx.arc(tip.x, tip.y, 5, 0, Math.PI * 2); curveCtx.fill();
        });
      }

      function hitTest(mx, my) {
        for (let i = curvePoints.length - 1; i >= 0; i--) {
          const p = projectPoint3D(curvePoints[i]);
          if (Math.hypot(mx - p.x, my - p.y) < 10) return { type: 'point', idx: i };
        }
        const p = curvePoints[selectedPoint];
        if (p) {
          const o = projectPoint3D(p);
          for (const axis of ['x','y','z']) {
            const d = axis === 'x' ? {x:45,y:0,z:0} : axis === 'y' ? {x:0,y:45,z:0} : {x:0,y:0,z:45};
            const tip = projectPoint3D({ x:p.x+d.x, y:p.y+d.y, z:p.z+d.z });
            if (Math.hypot(mx-tip.x,my-tip.y) < 9) return { type: 'axis', axis };
          }
          if (Math.hypot(mx-o.x,my-o.y) < 9) return { type:'point', idx:selectedPoint };
        }
        return null;
      }

      function applyAxisDrag(axis, dx, dy) {
        const p = curvePoints[selectedPoint]; if (!p) return;
        const gain = 0.7;
        const v = curveViewEl.value;
        if (axis === 'x') p.x += (v === 'side' ? 0 : dx * gain);
        if (axis === 'y') p.y += (-dy * gain);
        if (axis === 'z') {
          if (v === 'front') p.z += -dy * gain;
          else p.z += dx * gain;
        }
      }

      curveModeEnabledEl.addEventListener('change', () => {
        curveEditorPanelEl.classList.toggle('hidden', !curveModeEnabledEl.checked);
        drawCurveEditor();
      });
      curveTypeEl.addEventListener('change', drawCurveEditor);
      curveViewEl.addEventListener('change', drawCurveEditor);
      addCurvePointBtn.addEventListener('click', () => {
        const last = curvePoints[curvePoints.length - 1] || { x: 0, y: 0, z: 0 };
        curvePoints.push({ x: last.x + 30, y: last.y, z: last.z + 20 });
        selectedPoint = curvePoints.length - 1; drawCurveEditor();
      });
      removeCurvePointBtn.addEventListener('click', () => {
        if (curvePoints.length <= 2) return;
        curvePoints.splice(selectedPoint, 1);
        selectedPoint = Math.max(0, selectedPoint - 1); drawCurveEditor();
      });
      curveCanvas.addEventListener('pointerdown', (e) => {
        const r = curveCanvas.getBoundingClientRect();
        const mx = (e.clientX - r.left) * (curveCanvas.width / r.width);
        const my = (e.clientY - r.top) * (curveCanvas.height / r.height);
        const hit = hitTest(mx, my);
        if (!hit) return;
        if (hit.type === 'point') selectedPoint = hit.idx;
        drag = { mode: hit.type, axis: hit.axis || null, x: mx, y: my };
        curveCanvas.setPointerCapture(e.pointerId);
        drawCurveEditor();
      });
      curveCanvas.addEventListener('pointermove', (e) => {
        if (!drag) return;
        const r = curveCanvas.getBoundingClientRect();
        const mx = (e.clientX - r.left) * (curveCanvas.width / r.width);
        const my = (e.clientY - r.top) * (curveCanvas.height / r.height);
        const dx = mx - drag.x, dy = my - drag.y;
        if (drag.mode === 'axis' && drag.axis) applyAxisDrag(drag.axis, dx, dy);
        else if (drag.mode === 'point') { curvePoints[selectedPoint].x += dx * 0.5; curvePoints[selectedPoint].y -= dy * 0.5; }
        drag.x = mx; drag.y = my;
        drawCurveEditor();
      });
      curveCanvas.addEventListener('pointerup', () => { drag = null; });

      curveCanvas.tabIndex = 0;
      curveCanvas.addEventListener('keydown', (e) => {
        if (e.key === 'Tab') {
          e.preventDefault();
          if (!curvePoints.length) return;
          selectedPoint = (selectedPoint + (e.shiftKey ? curvePoints.length - 1 : 1)) % curvePoints.length;
          drawCurveEditor();
        }
      });

      openCurveWindowBtn.addEventListener('click', () => {
        const w = window.open('', 'curveEditorWindow', 'width=980,height=620');
        if (!w) return;
        w.document.write('<!doctype html><title>Curve Editor</title><style>body{margin:0;background:#0b1020;color:#fff;font-family:Arial;padding:12px}canvas{width:100%;height:90vh;border:1px solid #334155;background:#0f172a}</style><h3>Curve Editor (Mirror)</h3><canvas id="curveMirror" width="900" height="500"></canvas>');
        w.document.close();
        const mirror = w.document.getElementById('curveMirror');
        const mctx = mirror.getContext('2d');
        const pump = () => {
          if (w.closed) return;
          mctx.clearRect(0,0,mirror.width,mirror.height);
          mctx.drawImage(curveCanvas,0,0,mirror.width,mirror.height);
          w.requestAnimationFrame(pump);
        };
        pump();
      });


      (async function init() {
        await loadMeta();
        requestAnimationFrame(tick);
      })();
    </script>
  </body>
</html>
